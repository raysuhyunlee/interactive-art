<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pigeon — pose</title>
  </head>
  <body>
    <div id="app">
      <!-- hidden source video; frames feed both the pose model and the PIP -->
      <video id="webcam" playsinline muted></video>
      <canvas id="scene"></canvas>
      <canvas id="debug"></canvas>
      <div id="hud">
        <div id="status">starting…</div>
        <div id="stats">
          <div class="stat"><span class="k">alt</span><span id="alt-val">0.0</span></div>
          <div class="stat"><span class="k">spd</span><span id="spd-val">0.0</span></div>
          <div class="stat"><span class="k">hdg</span><span id="hdg-val">N 0°</span></div>
        </div>
        <div class="meter">
          <div class="label">flap <span id="flap-hz">0.0 Hz</span></div>
          <div class="bar"><div id="flap-fill"></div></div>
        </div>
        <div class="meter">
          <div class="label">tilt</div>
          <div class="bar center">
            <div class="midline"></div>
            <div id="tilt-knob"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
